name: wellet_connect
description: Wellet Connect companion app for care recipients — syncs health data, medications, and check-ins to the Wellet caregiver dashboard.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.0.0
  flutter_riverpod: ^2.0.0
  go_router: ^14.0.0
  health: ^12.0.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^18.0.0
  drift: ^2.0.0
  sqlite3_flutter_libs: ^0.5.0
  google_fonts: ^6.0.0
  haptic_feedback: ^0.5.0
  intl: ^0.19.0
  connectivity_plus: ^6.0.0
  path_provider: ^2.0.0
  path: ^1.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.0.0
  build_runner: ^2.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: DMSerifDisplay
      fonts:
        - asset: fonts/DMSerifDisplay-Regular.ttf
    - family: DMSans
      fonts:
        - asset: fonts/DMSans-Regular.ttf
        - asset: fonts/DMSans-Medium.ttf
          weight: 500
        - asset: fonts/DMSans-Bold.ttf
          weight: 700
